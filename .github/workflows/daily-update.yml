name: Daily OSINT Update

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch: {}  # 手动触发按钮

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        run: python data/fetch_data.py
        continue-on-error: false

      - name: Generate report
        run: python generate_report.py

      - name: Commit and push
        run: |
          git config user.name "OSINT Bot"
          git config user.email "osint-bot@users.noreply.github.com"
          git add docs/index.html data/latest.json data/history.json data/filtered_news.json data/events.json data/shipping_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update $(date -u +%Y-%m-%d)"
            git push
          fi
